sections:
  - badge: Minimal Setup
    title: Site Builder
    markdown: |
      ```bash
      mkdir -p src/pages
      echo "# Welcome" > src/pages/INDEX.mdx
      dinghy site start
      ```
    subtitle: one file, one command, live preview at localhost:3000
  - badge: 'Show Case'
    title: 'Web App'
    img: site-builder/site-app.png
  - id: site-preview
    img: site-builder/site-preview.png
  - id: site-custom
    img: site-builder/site-custom.png
  - title: S3 Deployment
    subtitle: built-in S3 support with smart defaults
    ul:
      li:
        - Removes .html extensions for clean URLs
        - Applies gzip compression to text files
        - Sets optimal cache-control headers
